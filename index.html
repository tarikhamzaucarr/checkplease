<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#050505">
  <meta name="description" content="Check Please — Receipt scanner and multi-currency analyzer">
  <title>Check Please</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- Header -->
  <header class="header" id="main-header">
    <div class="logo">Check Please<span class="dot">.</span></div>
    <nav class="nav" role="navigation">
      <button class="nav-btn active" data-target="scan-page" id="nav-scan">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <span>Scan</span>
      </button>
      <button class="nav-btn" data-target="history-page" id="nav-history">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>History</span>
      </button>
      <button class="nav-btn" data-target="settings-page" id="nav-settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </nav>
  </header>

  <!-- ===== View: SCAN ===== -->
  <main id="scan-page" class="view active">
    <div class="scan-container">

      <!-- Empty State (shown when no images selected) -->
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 10h20"/><path d="M6 14h.01"/><path d="M10 14h4"/></svg>
        </div>
        <h2 class="empty-title">Scan your receipts</h2>
        <p class="empty-subtitle">Take a photo or upload from gallery to analyze currencies and calculate deductions.</p>
      </div>

      <!-- Action Buttons -->
      <div class="actions-wrapper" id="actions-wrapper">
        <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>
        <input type="file" id="gallery-input" accept="image/*" hidden multiple>

        <button class="primary-btn" id="btn-camera">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Scan Receipt
        </button>
        <button class="secondary-btn" id="btn-gallery">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Select from Gallery
        </button>
      </div>

      <!-- Selected Images Preview -->
      <div class="preview-section" id="preview-section" style="display:none;">
        <div class="preview-header">
          <span class="selected-count" id="selected-count">0 receipts</span>
          <button class="text-btn" id="btn-clear">Clear all</button>
        </div>
        <div class="selected-images" id="image-preview-container"></div>
        <button id="btn-process" class="process-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Analyze Receipts
        </button>
      </div>

      <!-- Processing Indicator -->
      <div class="status-indicator" id="status-indicator" style="display:none;">
        <div class="spinner"></div>
        <span>Analyzing receipts...</span>
      </div>

      <!-- Results Panel -->
      <div class="results-panel" id="results-panel" style="display:none;">
        <div class="results-header">
          <h3 class="section-title">Breakdown</h3>
          <button class="text-btn" id="btn-new-scan">New scan</button>
        </div>
        <div class="currency-grid" id="currency-grid"></div>
        <div class="results-actions">
          <button id="btn-save-record" class="primary-btn save-btn">Save Record</button>
        </div>
      </div>

    </div>
  </main>

  <!-- ===== View: HISTORY ===== -->
  <main id="history-page" class="view">
    <div class="padded-container" id="history-container">
      <div class="history-empty" id="history-empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3;margin-bottom:12px"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <div>No records yet</div>
        <div class="history-hint">Scanned receipts will appear here.</div>
      </div>
    </div>
  </main>

  <!-- ===== View: SETTINGS ===== -->
  <main id="settings-page" class="view">
    <div class="padded-container settings-container">
      <h3 class="settings-title">Configuration</h3>

      <div class="form-group">
        <label for="input-api-key">Processing Key</label>
        <div class="input-with-toggle">
          <input type="password" id="input-api-key" placeholder="Paste your key here..." autocomplete="off">
          <button class="toggle-vis" id="toggle-api-key" type="button" aria-label="Show key">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <p class="form-hint">Saved to cloud — works on all devices.</p>
      </div>

      <button class="primary-btn" id="btn-save-settings">Save Key</button>

      <div class="system-status" id="system-status-msg"></div>

      <div class="settings-footer">
        <span>Check Please v2.1</span>
      </div>
    </div>
  </main>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
